<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <!-- insertar una imagen para el logotipo y describir que es -->
        <img src="../assets/images/logo.png" alt="Little Lemon Logo">

    </header>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <h1>Sign Up</h1>
        <form action="/submit-form" method="post">
            <div>
                <label for="user_first_name">First Name:</label><br>
                <input type="text" id="user_first_name" name="user_first_name" required>
            </div>
            <div>
                <label for="user_last_name">Last Name:</label><br>
                <input type="text" id="user_last_name" name="user_last_name" required>
            </div>

            <div>
                <label for="user_email">Email:</label><br>
                <input type="email" id="user_email" name="user_email" required>
            </div>

            <div>
                <label for="user_password">Password:</label><br>
                <input type="password" id="user_password" name="user_password" required>
            </div>
            <div>
                <label for="user_confirmpassword">Confirm Password:</label><br>
                <input type="password" id="user_confirmpassword" name="user_confirmpassword" required>
            </div>

            <div>
                <br><button type="submit">Sign Up</button>
            </div>
        </form>
    </main>
    <footer>
        <p>Copyright Little Lemon</p>
    </footer>
</body>

</html>

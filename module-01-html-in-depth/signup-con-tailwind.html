<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>

    </header>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main class="min-h-screen bg-gray-100 flex flex-col justify-center items-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Sign Up</h1>

        <form action="/submit-form" method="post" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <!-- El DIV te permite dar margen abajo (mb-4) para separar los campos -->
            <div class="mb-4 flex flex-col">
                <label for="name" class="text-sm font-semibold text-gray-600 mb-1">Name:</label>
                <input type="text" id="name" name="name" required
                    class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4 flex flex-col">
                <label for="email" class="text-sm font-semibold text-gray-600 mb-1">Email:</label>
                <input type="email" id="email" name="email" required
                    class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6 flex flex-col">
                <label for="password" class="text-sm font-semibold text-gray-600 mb-1">Password:</label>
                <input type="password" id="password" name="password" required
                    class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-2 rounded transition colors">Sign
                Up</button>
        </form>
    </main>
    <footer>

    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="es">
<!-- el sitio esta en español -->

<head>
    <!-- Metaetiquetas para la optimizacion de motores de busqueda (SEO) y para mejorar la experiencia del usuario al proporcionar informacion relevante sobre el sitio web. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plantilla Base Para la Creacion de un Sitio Web</title>
    <meta name="description"
        content="Agregar una breve descripcion del sitio web para mejorar el SEO y atraer a los visitantes">
    <meta name="autor" content="Soluciones Digitales del Norte">

    <!-- Open Graph Protocol -->
    <meta property="og:title" content="Plantilla Base Para la Creacion de un Sitio Web">
    <meta property="og:description"
        content="Agregar una breve descripcion del sitio web para mejorar el SEO y atraer a los visitantes">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com">
    <meta property="og:image" content="agregar-mi-imagen.jpg">

    <!-- Metaetiquetas opcionales del open graph protocol para mejorar la apariencia del sitio web 
     al compartirlo en redes sociales y otras plataformas. -->
    <meta property="og:description"
        content="Agregar una breve descripcion del sitio web para mejorar el SEO y atraer a los visitantes">
    <meta property="og:site_name" content="Nombre del Sitio Web">
    <meta property="og:locale" content="es_ES">

    <!-- Metaetiquetas para el icono de la pagina web (favicon) -->
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Metaetiqueta para enlazar una hoja de estilos CSS externa para el diseño del sitio web. -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <!-- Añadir el nombre del sitio web, un logotipo o una imagen relevante para el sitio web. 
         El encabezado es la primera sección que los visitantes ven al ingresar al sitio web, 
         por lo que es importante que sea atractivo y represente adecuadamente el contenido del sitio web. -->
        <h1>Nombre del Sitio Web</h1>

        <!-- insertar una imagen para el logotipo y describir que es -->
        <img src="logo.png" alt="Little Lemon Logo">
        <p>Header</p>
    </header>
    <nav>
        <!-- Añade aquí tu barra de navegación con enlaces a las diferentes secciones o páginas de tu sitio web. -->
        <ul>
            <li><a href="#index.html">Inicio</a></li>
            <li><a href="#acerca.html">Acerca de</a></li>
            <li><a href="#servicios.html">Servicios</a></li>
            <li><a href="#contacto.html">Contacto</a></li>
        </ul>
    </nav>
    <main>
        <!-- Añade aquí el contenido principal de tu sitio web, como texto, imágenes, 
         videos o cualquier otro elemento que desees mostrar a tus visitantes. 
         El contenido debe ser relevante y atractivo para tu audiencia objetivo. -->
        <h2>Heading</h2>
    </main>
    <footer>
        <!-- Añade aquí la información de contacto, enlaces a redes sociales o cualquier otra información relevante para los visitantes. 
         El pie de página es una sección importante para proporcionar información adicional y facilitar la navegación en el sitio web. -->
        <p>Footer</p>
    </footer>

    <!-- Incluye aquí cualquier script o código adicional que necesites para el funcionamiento de tu sitio web, 
     como scripts de seguimiento, formularios de contacto o cualquier otro elemento interactivo. -->
    <script src="js/scripts.js"></script>

</body>

</html>
